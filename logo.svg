<?xml version="1.0" encoding="UTF-8"?>
<svg
  width="1200"
  height="512"
  viewBox="0 0 1200 512"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient id="fhGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD54A"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background hex -->
  <polygon
    points="256,40 416,136 416,328 256,424 96,328 96,136"
    fill="#0F1730"
    stroke="url(#fhGold)"
    stroke-width="10"
    filter="url(#glow)"
  />

  <!-- Center -->
  <polygon
    points="256,150 320,188 320,264 256,302 192,264 192,188"
    fill="url(#fhGold)"
  />

  <!-- Top -->
  <polygon
    points="256,96 304,124 304,172 256,200 208,172 208,124"
    fill="#FFD54A"
    opacity="0.9"
  />

  <!-- Bottom -->
  <polygon
    points="256,312 304,340 304,388 256,416 208,388 208,340"
    fill="#FFB300"
    opacity="0.9"
  />

  <!-- Left -->
  <polygon
    points="176,200 224,228 224,276 176,304 128,276 128,228"
    fill="#FFC107"
    opacity="0.85"
  />

  <!-- Right -->
  <polygon
    points="336,200 384,228 384,276 336,304 288,276 288,228"
    fill="#FFC107"
    opacity="0.85"
  />

  <!-- Connection lines -->
  <g stroke="#FFD54A" stroke-width="4" opacity="0.8">
    <line x1="256" y1="200" x2="256" y2="150"/>
    <line x1="256" y1="302" x2="256" y2="340"/>
    <line x1="224" y1="238" x2="176" y2="262"/>
    <line x1="288" y1="238" x2="336" y2="262"/>
  </g>

  <!-- FieldHive Text -->
  <text
    x="470"
    y="285"
    font-family="Segoe UI, Arial, sans-serif"
    font-size="120"
    fill="url(#fhGold)"
    font-weight="600"
  >
    FieldHive
  </text>

  <!-- Trademark -->
  <text
    x="870"
    y="220"
    font-family="Segoe UI, Arial, sans-serif"
    font-size="42"
    fill="url(#fhGold)"
    font-weight="600"
  >
    ™
  </text>

</svg>
